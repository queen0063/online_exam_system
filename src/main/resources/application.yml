server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: online-exam-system-backend
  datasource:
    url: jdbc:mysql://localhost:3306/online_exam_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&connectionTimeZone=Asia/Shanghai&forceConnectionTimeZoneToSession=true&useSSL=false
    username: root
    password: your_password_here
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  sql:
    init:
      mode: never

mybatis:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.exam.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

app:
  jwt:
    secret: OnlineExamSystemJwtSecretKeyForSpringBootBackend2026SecureKey
    expiration-minutes: 720
  security:
    ignore-urls:
      - /auth/login
      - /error
  swagger:
    enabled: false
