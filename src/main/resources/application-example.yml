server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: online-exam-system-backend
  datasource:
    url: jdbc:mysql://localhost:3306/online_exam_system?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8&connectionTimeZone=GMT%2B8&forceConnectionTimeZoneToSession=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: your_password_here
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  sql:
    init:
      mode: never

mybatis:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.exam.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

app:
  jwt:
    secret: OnlineExamSystemJwtSecretKeyForSpringBootBackend2026SecureKey
    expiration-minutes: 720
  security:
    ignore-urls:
      - /auth/login
      - /error
  swagger:
    enabled: false

  upyun:
    bucket: ${UPYUN_BUCKET:}
    operator: ${UPYUN_OPERATOR:}
    password: ${UPYUN_PASSWORD:}
    domain: ${UPYUN_DOMAIN:}
    upload-host: ${UPYUN_UPLOAD_HOST:}
    save-key: /exam/questions/{year}/{mon}/{day}/{random32}{.suffix}
    expiration-minutes: 30
    max-file-size: 2097152
    allow-file-type: jpg,jpeg,png,gif,webp
